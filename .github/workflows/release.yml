name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: scri
  NIM_VERSION: 2.2.4

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          curl -fsSL "https://nim-lang.org/download/nim-${NIM_VERSION}-linux_x64.tar.xz" | tar xJ -C /opt
          echo "/opt/nim-${NIM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          nim c -d:release --opt:speed -o:"$PROJECT_NAME" "src/$PROJECT_NAME.nim"
          strip --strip-all "$PROJECT_NAME"

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "$PROJECT_NAME" dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ]   && cp LICENSE   dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: dist

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          curl -fsSL "https://nim-lang.org/download/nim-${NIM_VERSION}-linux_x64.tar.xz" | tar xJ -C /opt
          echo "/opt/nim-${NIM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          nim c -d:release --cpu:amd64 --os:windows \
              --gcc.exe:x86_64-w64-mingw32-gcc \
              --gcc.linkerexe:x86_64-w64-mingw32-gcc \
              -o:"$PROJECT_NAME.exe" "src/$PROJECT_NAME.nim"
          x86_64-w64-mingw32-strip --strip-all "$PROJECT_NAME.exe"

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "${PROJECT_NAME}.exe" dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ]   && cp LICENSE   dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: linux-zip

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: windows-zip

      - name: Package
        run: |
          (cd linux-zip   && zip -r "../${PROJECT_NAME}-linux.zip"   .)
          (cd windows-zip && zip -r "../${PROJECT_NAME}-windows.zip" .)

      - name: Create release
        env:
          GH_TOKEN:   ${{ github.token }}
          VERSION:    ${{ inputs.version }}
          NOTES:      ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          flags=()
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release create "$VERSION" \
              "${PROJECT_NAME}-linux.zip" \
              "${PROJECT_NAME}-windows.zip" \
              --title "$VERSION" \
              --notes "$NOTES" \
              "${flags[@]}"
